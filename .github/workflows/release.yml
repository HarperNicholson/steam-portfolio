name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Build AppImage + deb
        run: npx electron-builder --linux AppImage deb --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
          generate_release_notes: true

  build-flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: SteamPortfolio.flatpak
          manifest-path: build/io.github.HarperNicholson.SteamPortfolio.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - uses: softprops/action-gh-release@v2
        with:
          files: SteamPortfolio.flatpak
