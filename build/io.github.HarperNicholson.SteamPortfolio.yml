app-id: io.github.HarperNicholson.SteamPortfolio
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: steamportfolio
separate-locales: false

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/node22/bin

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: steamportfolio
    buildsystem: simple
    build-options:
      env:
        npm_config_cache: /run/build/steamportfolio/flatpak-node/npm-cache
        npm_config_offline: 'true'
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    build-commands:
      # Install npm deps from pre-generated offline cache
      - npm install --offline
      # Place the pre-downloaded Electron binary where electron-builder expects it
      - mkdir -p node_modules/electron/dist
      - unzip -q electron-v42.4.1-linux-x64.zip -d node_modules/electron/dist
      - echo "electron" > node_modules/electron/path.txt
      # Build renderer + main with electron-vite
      - npm run build
      # Package to unpacked directory (no AppImage tooling needed)
      - npx electron-builder --linux dir --x64
      # Install app files
      - cp -r dist/linux-unpacked /app/lib/steamportfolio
      - chmod +x /app/lib/steamportfolio/steamportfolio
      - mkdir -p /app/bin
      - printf '#!/bin/sh\nexec /app/lib/steamportfolio/steamportfolio --no-sandbox "$@"\n'
          > /app/bin/steamportfolio
      - chmod +x /app/bin/steamportfolio
      - install -Dm644 resources/icon.png
          /app/share/icons/hicolor/512x512/apps/io.github.HarperNicholson.SteamPortfolio.png
      - install -Dm644 build/io.github.HarperNicholson.SteamPortfolio.desktop
          /app/share/applications/io.github.HarperNicholson.SteamPortfolio.desktop
      - install -Dm644 build/io.github.HarperNicholson.SteamPortfolio.metainfo.xml
          /app/share/metainfo/io.github.HarperNicholson.SteamPortfolio.metainfo.xml
    sources:
      - type: git
        url: https://github.com/HarperNicholson/steam-portfolio.git
        tag: v0.1.0
        commit: 3d8c56446d55c40d915eaae0b486da306524e243
      - type: file
        url: https://github.com/electron/electron/releases/download/v42.4.1/electron-v42.4.1-linux-x64.zip
        sha256: 1ac0306029b2c95dc5424afff4ab061e9154d8a9ea3bb5a35a7d7166b9245b29
        dest-filename: electron-v42.4.1-linux-x64.zip
      - generated-sources.json
